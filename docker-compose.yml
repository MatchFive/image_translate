version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: image_translate_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-imagetranslate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imagetranslate_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-image_translate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-imagetranslate}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: image_translate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: image_translate_backend
    network_mode: host
    env_file:
      - .env
    environment:
      POSTGRES_HOST: localhost
      REDIS_HOST: localhost
    volumes:
      - ./uploads:/app/uploads
      - ./backend/workflows:/app/workflows
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
